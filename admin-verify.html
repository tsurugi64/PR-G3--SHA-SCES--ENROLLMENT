<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Access - Verify Email</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #e9ffff, #ffffff, #e0faf6);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      background: linear-gradient(145deg, #ffffff, #e8f8f5);
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.18);
      width: 100%;
      max-width: 420px;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo {
      width: 70px;
      height: 70px;
      background: #00A693;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      box-shadow: 0 4px 12px rgba(0, 166, 147, 0.3);
    }

    .logo i {
      font-size: 36px;
      color: white;
    }
    
    h1 {
      color: #00A693;
      margin-bottom: 10px;
      font-size: 1.8em;
    }
    
    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 0.9em;
    }

    .step-indicator {
      display: flex;
      justify-content: space-between;
      margin-bottom: 35px;
      gap: 10px;
    }

    .step {
      flex: 1;
      text-align: center;
    }

    .step-number {
      width: 40px;
      height: 40px;
      background: #e0f2f1;
      color: #00A693;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      margin: 0 auto 8px;
      font-size: 0.9em;
    }

    .step.active .step-number {
      background: #00A693;
      color: white;
    }

    .step-label {
      font-size: 0.8em;
      color: #999;
    }

    .step.active .step-label {
      color: #00A693;
      font-weight: 600;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    label {
      display: block;
      margin-bottom: 8px;
      color: #003f39;
      font-weight: 600;
      font-size: 0.95em;
    }
    
    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #b5d8d2;
      border-radius: 10px;
      background: linear-gradient(145deg, #ffffff, #eefaf7);
      font-family: 'Poppins', sans-serif;
      font-size: 1em;
      transition: 0.25s;
    }
    
    input:focus {
      outline: none;
      border-color: #00A693;
      box-shadow: 0 0 8px rgba(0, 166, 147, 0.35);
      background: #ffffff;
    }

    input:disabled {
      background: #f5f5f5;
      color: #999;
      opacity: 0.6;
    }
    
    .btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(145deg, #00b4a4, #008f80);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1em;
      font-weight: 600;
      cursor: pointer;
      transition: 0.25s;
      margin-top: 10px;
    }
    
    .btn:hover:not(:disabled) {
      transform: scale(1.04);
    }
    
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: #e0e0e0;
      color: #333;
      margin-top: 10px;
    }

    .btn-secondary:hover:not(:disabled) {
      background: #d0d0d0;
    }
    
    .message {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
      font-size: 0.9em;
    }
    
    .message.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
      display: block;
    }
    
    .message.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      display: block;
    }

    .message.info {
      background: #d1ecf1;
      color: #0c5460;
      border: 1px solid #bee5eb;
      display: block;
    }

    .timer {
      text-align: center;
      color: #00A693;
      font-size: 0.9em;
      font-weight: 600;
      margin-bottom: 15px;
    }

    .timer.warning {
      color: #ff9800;
    }

    .info-box {
      background: #e7f3ff;
      border-left: 4px solid #00A693;
      padding: 12px;
      border-radius: 5px;
      margin-bottom: 20px;
      font-size: 0.85em;
      color: #003f39;
    }

    .next-step-link {
      text-align: center;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #e0e0e0;
    }

    .next-step-link a {
      color: #00A693;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9em;
    }

    .next-step-link a:hover {
      text-decoration: underline;
    }

    #step-1 { display: block; }
    #step-2 { display: none; }

    .code-input-group {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .code-input-group input {
      flex: 1;
      text-align: center;
      font-size: 1.5em;
      font-weight: bold;
      letter-spacing: 5px;
      font-family: monospace;
    }

    .resend-info {
      text-align: center;
      font-size: 0.85em;
      color: #666;
      margin-top: 15px;
    }

    .resend-info a {
      color: #00A693;
      text-decoration: none;
      font-weight: 600;
      cursor: pointer;
    }

    .resend-info a:hover:not(.disabled) {
      text-decoration: underline;
    }

    .resend-info a.disabled {
      color: #999;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">🔐</div>
      <h1>Admin Access</h1>
      <p class="subtitle">Sacred Heart Academy Enrollment System</p>
    </div>

    <div id="message" class="message"></div>

    <!-- STEP 1: EMAIL VERIFICATION -->
    <div id="step-1">
      <div class="step-indicator">
        <div class="step active">
          <div class="step-number">1</div>
          <div class="step-label">Email</div>
        </div>
        <div class="step">
          <div class="step-number">2</div>
          <div class="step-label">Verify</div>
        </div>
      </div>

      <div class="info-box">
        📧 Enter your email to receive a verification code
      </div>

      <form id="emailForm">
        <div class="form-group">
          <label for="email">Email Address:</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            placeholder="your_email@gmail.com"
            required
          >
        </div>

        <button type="submit" class="btn" id="sendCodeBtn">
          📧 Send Verification Code
        </button>
      </form>
    </div>

    <!-- STEP 2: CODE VERIFICATION -->
    <div id="step-2">
      <div class="step-indicator">
        <div class="step">
          <div class="step-number">1</div>
          <div class="step-label">Email</div>
        </div>
        <div class="step active">
          <div class="step-number">2</div>
          <div class="step-label">Verify</div>
        </div>
      </div>

      <form id="verifyForm">
        <div class="form-group">
          <label>Email:</label>
          <input 
            type="email" 
            id="verifyEmail" 
            readonly
          >
        </div>

        <div class="timer" id="timer">
          ⏰ Code expires in: <span id="timerCount">15:00</span>
        </div>

        <div class="form-group">
          <label for="code">Enter Verification Code:</label>
          <input 
            type="text" 
            id="code" 
            name="code" 
            placeholder="000000"
            maxlength="6"
            inputmode="numeric"
            pattern="[0-9]{6}"
            required
          >
        </div>

        <button type="submit" class="btn" id="verifyBtn">
          ✅ Verify Email
        </button>

        <button type="button" class="btn btn-secondary" onclick="goBackToEmail()">
          ← Back
        </button>

        <div class="resend-info">
          <a id="resendLink" class="disabled">Resend Code in <span id="resendTimer">60</span>s</a>
        </div>
      </form>
    </div>

    <div class="next-step-link" id="nextStepDiv" style="display: none;">
      <p style="color: #666; margin-bottom: 15px;">What would you like to do?</p>
      <a href="admin-create.html" class="btn" style="text-decoration: none; display: block; margin-bottom: 10px;">
        ➕ Create Account
      </a>
      <a href="admin-login.html" class="btn btn-secondary" style="text-decoration: none; display: block;">
        🔑 Login
      </a>
    </div>
  </div>

  <script>
    let verificationEmail = '';
    let resendCooldown = 0;
    let codeTimerInterval = null;
    let codeExpireTime = null;
    let isVerified = false;

    function showMessage(text, type = 'info') {
      const msgDiv = document.getElementById('message');
      msgDiv.textContent = text;
      msgDiv.className = `message ${type}`;
    }

    // Step 1: Request verification code
    document.getElementById('emailForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value.trim();
      const btn = document.getElementById('sendCodeBtn');
      
      btn.disabled = true;
      btn.textContent = '⏳ Sending...';
      
      try {
        const response = await fetch('/api/admin/request-code', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        
        const data = await response.json();
        
        if (data.success) {
          verificationEmail = email;
          document.getElementById('verifyEmail').value = email;
          
          // Move to step 2
          document.getElementById('step-1').style.display = 'none';
          document.getElementById('step-2').style.display = 'block';
          document.getElementById('nextStepDiv').style.display = 'none';
          
          showMessage('✅ Verification code sent! Check your email.', 'success');
          
          // Start timers
          startCodeTimer();
          startResendCooldown();
          
          // Focus on code input
          document.getElementById('code').focus();
        } else {
          showMessage('❌ ' + data.message, 'error');
        }
      } catch (error) {
        showMessage('❌ Error: ' + error.message, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = '📧 Send Verification Code';
      }
    });

    // Step 2: Verify code
    document.getElementById('verifyForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const code = document.getElementById('code').value.replace(/\D/g, '');
      const btn = document.getElementById('verifyBtn');
      
      if (code.length !== 6) {
        showMessage('❌ Verification code must be exactly 6 digits', 'error');
        return;
      }
      
      btn.disabled = true;
      btn.textContent = '⏳ Verifying...';
      
      try {
        const response = await fetch('/api/admin/verify-email-code', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: verificationEmail,
            code: code
          })
        });
        
        const data = await response.json();
        
        if (data.success) {
          isVerified = true;
          showMessage('✅ Email verified successfully!', 'success');
          
          if (codeTimerInterval) clearInterval(codeTimerInterval);
          
          // Show next step options
          setTimeout(() => {
            document.getElementById('step-2').style.display = 'none';
            document.getElementById('nextStepDiv').style.display = 'block';
            
            // Store verified email in session
            sessionStorage.setItem('verifiedAdminEmail', verificationEmail);
          }, 1500);
        } else {
          showMessage('❌ ' + data.message, 'error');
          document.getElementById('code').value = '';
          document.getElementById('code').focus();
        }
      } catch (error) {
        showMessage('❌ Error: ' + error.message, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = '✅ Verify Email';
      }
    });

    // Code timer (15 minutes)
    function startCodeTimer() {
      codeExpireTime = Date.now() + (15 * 60 * 1000);
      codeTimerInterval = setInterval(() => {
        const remaining = Math.max(0, codeExpireTime - Date.now());
        const minutes = Math.floor(remaining / 60000);
        const seconds = Math.floor((remaining % 60000) / 1000);
        
        const timerDisplay = document.getElementById('timerCount');
        timerDisplay.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
        
        const timerEl = document.getElementById('timer');
        if (remaining < 300000) { // 5 minutes
          timerEl.classList.add('warning');
        }
        
        if (remaining === 0) {
          clearInterval(codeTimerInterval);
          document.getElementById('code').disabled = true;
          showMessage('❌ Verification code expired. Please request a new one.', 'error');
          goBackToEmail();
        }
      }, 1000);
    }

    // Resend cooldown (60 seconds)
    function startResendCooldown() {
      resendCooldown = 60;
      const resendLink = document.getElementById('resendLink');
      resendLink.classList.add('disabled');
      
      const interval = setInterval(() => {
        resendCooldown--;
        document.getElementById('resendTimer').textContent = resendCooldown;
        
        if (resendCooldown === 0) {
          clearInterval(interval);
          resendLink.classList.remove('disabled');
          resendLink.onclick = resendCode;
        }
      }, 1000);
    }

    // Resend verification code
    async function resendCode() {
      if (resendCooldown > 0) return;
      
      const email = verificationEmail;
      const resendLink = document.getElementById('resendLink');
      resendLink.textContent = '⏳ Sending...';
      resendLink.style.pointerEvents = 'none';
      
      try {
        const response = await fetch('/api/admin/request-code', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        
        const data = await response.json();
        
        if (data.success) {
          showMessage('✅ New code sent to your email!', 'success');
          
          // Reset timers
          if (codeTimerInterval) clearInterval(codeTimerInterval);
          document.getElementById('timer').classList.remove('warning');
          document.getElementById('code').disabled = false;
          document.getElementById('code').value = '';
          
          startCodeTimer();
          startResendCooldown();
        } else {
          showMessage('❌ ' + data.message, 'error');
        }
      } catch (error) {
        showMessage('❌ Error: ' + error.message, 'error');
      } finally {
        resendLink.textContent = 'Resend Code in 60s';
        resendLink.style.pointerEvents = 'auto';
      }
    }

    // Go back to email step
    function goBackToEmail() {
      if (codeTimerInterval) clearInterval(codeTimerInterval);
      document.getElementById('step-1').style.display = 'block';
      document.getElementById('step-2').style.display = 'none';
      document.getElementById('message').style.display = 'none';
      document.getElementById('verifyForm').reset();
      document.getElementById('emailForm').reset();
      verificationEmail = '';
      isVerified = false;
      document.getElementById('email').focus();
    }
  </script>
</body>
</html>
