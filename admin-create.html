<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Admin Account - SHA Enrollment</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #00A693 0%, #008f80 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 450px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header img {
            width: 60px;
            height: 60px;
            margin-bottom: 15px;
        }

        .header h1 {
            color: #003F39;
            font-size: 1.8em;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 0.95em;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #003F39;
            font-weight: 600;
            font-size: 0.95em;
        }

        input, select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: #00A693;
            box-shadow: 0 0 0 3px rgba(0, 166, 147, 0.1);
        }

        input:read-only {
            background-color: #f5f5f5;
            cursor: not-allowed;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00A693 0%, #008f80 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 166, 147, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: white;
            color: #00A693;
            border: 2px solid #00A693;
        }

        .btn-secondary:hover {
            background: #f0f8f6;
        }

        .message {
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 0.95em;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: #00A693;
            text-decoration: none;
            font-weight: 600;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        .email-display {
            background: #f0f8f6;
            padding: 12px;
            border-radius: 8px;
            color: #00A693;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .small-text {
            color: #666;
            font-size: 0.85em;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="sha_logo.png" alt="SHA Logo">
            <h1>Create Admin Account</h1>
            <p>Sacred Heart Academy Enrollment System</p>
        </div>

        <div id="message" class="message"></div>

        <form id="createForm">
            <div class="form-group">
                <label>Authorized Email:</label>
                <div class="email-display" id="emailDisplay"></div>
            </div>

            <div class="form-group">
                <label for="username">Create Username</label>
                <input 
                    type="text" 
                    id="username" 
                    name="username" 
                    placeholder="your_username"
                    minlength="3"
                    maxlength="20"
                    required
                >
                <p class="small-text">3-20 characters, letters and numbers</p>
            </div>

            <div class="form-group">
                <label for="password">Create Password</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="••••••"
                    minlength="6"
                    required
                >
                <p class="small-text">At least 6 characters</p>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input 
                    type="password" 
                    id="confirmPassword" 
                    name="confirmPassword" 
                    placeholder="••••••"
                    minlength="6"
                    required
                >
            </div>

            <button type="submit" class="btn btn-primary" id="createBtn">
                ✅ Create Account
            </button>

            <button type="button" class="btn btn-secondary" onclick="goBack()">
                ← Back to Select Interface
            </button>
        </form>

        <div class="back-link">
            <a href="admin-login.html">Already have account? Login</a>
        </div>
    </div>

    <script>
        // Check if email was verified
        window.addEventListener('DOMContentLoaded', () => {
            const adminEmail = sessionStorage.getItem('adminEmail');
            
            if (!adminEmail) {
                showMessage('⚠️ Please verify your email first', 'error');
                setTimeout(() => {
                    window.location.href = 'select-interface.html';
                }, 2000);
                return;
            }
            
            document.getElementById('emailDisplay').textContent = adminEmail;
            document.getElementById('username').focus();
        });

        // Create account
        document.getElementById('createForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = sessionStorage.getItem('adminEmail');
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const createBtn = document.getElementById('createBtn');
            
            // Validate
            if (!email || !username || !password) {
                showMessage('❌ All fields required', 'error');
                return;
            }
            
            if (password !== confirmPassword) {
                showMessage('❌ Passwords do not match', 'error');
                return;
            }
            
            if (!/^[a-zA-Z0-9_-]+$/.test(username)) {
                showMessage('❌ Username can only contain letters, numbers, dashes, underscores', 'error');
                return;
            }
            
            createBtn.disabled = true;
            createBtn.textContent = '⏳ Creating...';
            
            try {
                const response = await fetch('/api/admin/create-account', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, username, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showMessage('✅ Account created! Redirecting to login...', 'success');
                    sessionStorage.removeItem('adminEmail');
                    
                    setTimeout(() => {
                        window.location.href = 'admin-login.html';
                    }, 1500);
                } else {
                    showMessage('❌ ' + data.message, 'error');
                    createBtn.disabled = false;
                    createBtn.textContent = '✅ Create Account';
                }
            } catch (error) {
                showMessage('❌ Error: ' + error.message, 'error');
                createBtn.disabled = false;
                createBtn.textContent = '✅ Create Account';
            }
        });

        function showMessage(text, type = 'info') {
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = text;
            msgDiv.className = 'message ' + type;
        }

        function goBack() {
            sessionStorage.removeItem('adminEmail');
            window.location.href = 'select-interface.html';
        }
    </script>
</body>
</html>
