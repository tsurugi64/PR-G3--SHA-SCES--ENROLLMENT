<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Admin Account - SHA Enrollment</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #00A693 0%, #008f80 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 450px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header img {
            width: 60px;
            height: 60px;
            margin-bottom: 15px;
        }

        .header h1 {
            color: #003F39;
            font-size: 1.8em;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 0.95em;
        }

        .verified-badge {
            background: #d4edda;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            color: #155724;
            font-size: 0.9em;
            border: 1px solid #c3e6cb;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #003F39;
            font-weight: 600;
            font-size: 0.95em;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: #00A693;
            box-shadow: 0 0 0 3px rgba(0, 166, 147, 0.1);
        }

        input:read-only {
            background-color: #f5f5f5;
            cursor: not-allowed;
        }

        input[type="password"] {
            font-family: 'Courier New', monospace;
        }

        .password-group {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 40px;
            cursor: pointer;
            color: #00A693;
            font-size: 1.1em;
            user-select: none;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00A693 0%, #008f80 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 166, 147, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: white;
            color: #00A693;
            border: 2px solid #00A693;
        }

        .btn-secondary:hover {
            background: #f0f8f6;
            transform: translateY(-2px);
        }

        .message {
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 0.95em;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: #00A693;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }

        .back-link a:hover {
            color: #008f80;
        }

        .small-text {
            color: #666;
            font-size: 0.85em;
            margin-top: 5px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }

            .header h1 {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="sha_logo.png" alt="SHA Logo">
            <h1>Create Admin Account</h1>
            <p>Sacred Heart Academy Enrollment System</p>
        </div>

        <div id="message" class="message"></div>

        <div class="verified-badge">
            ✅ Email verified
        </div>

        <form id="createAccountForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    readonly
                    placeholder="verified email"
                >
            </div>

            <div class="form-group">
                <label for="username">Create Username</label>
                <input 
                    type="text" 
                    id="username" 
                    name="username" 
                    placeholder="your_username"
                    minlength="3"
                    maxlength="20"
                    required
                >
                <p class="small-text">3-20 characters, letters and numbers only</p>
            </div>

            <div class="form-group password-group">
                <label for="password">Create Password</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="••••••"
                    minlength="6"
                    required
                >
                <span class="toggle-password" onclick="togglePasswordVisibility('password')">👁️</span>
                <p class="small-text">At least 6 characters</p>
            </div>

            <div class="form-group password-group">
                <label for="confirmPassword">Confirm Password</label>
                <input 
                    type="password" 
                    id="confirmPassword" 
                    name="confirmPassword" 
                    placeholder="••••••"
                    minlength="6"
                    required
                >
                <span class="toggle-password" onclick="togglePasswordVisibility('confirmPassword')">👁️</span>
            </div>

            <button type="submit" class="btn btn-primary" id="createBtn">
                ✅ Create Account
            </button>

            <button type="button" class="btn btn-secondary" onclick="goBack()">
                ← Back
            </button>
        </form>

        <div class="back-link">
            <a href="select-interface.html">← Change interface</a>
        </div>
    </div>

    <script>
        // On page load, check for verified email in sessionStorage
        window.addEventListener('DOMContentLoaded', () => {
            const verifiedEmail = sessionStorage.getItem('verifiedAdminEmail');
            
            if (!verifiedEmail) {
                // No verified email - redirect to verification
                showMessage('⚠️ Email not verified. Please verify your email first.', 'error');
                setTimeout(() => {
                    window.location.href = 'select-interface.html';
                }, 2000);
                return;
            }
            
            // Auto-fill the verified email
            document.getElementById('email').value = verifiedEmail;
            document.getElementById('username').focus();
        });

        // Toggle password visibility
        function togglePasswordVisibility(fieldId) {
            const field = document.getElementById(fieldId);
            field.type = field.type === 'password' ? 'text' : 'password';
        }

        // Handle form submission
        document.getElementById('createAccountForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const createBtn = document.getElementById('createBtn');
            
            // Validate inputs
            if (!email || !username || !password) {
                showMessage('❌ Please fill in all fields', 'error');
                return;
            }
            
            if (password !== confirmPassword) {
                showMessage('❌ Passwords do not match', 'error');
                document.getElementById('confirmPassword').focus();
                return;
            }
            
            if (password.length < 6) {
                showMessage('❌ Password must be at least 6 characters', 'error');
                return;
            }
            
            if (!/^[a-zA-Z0-9_-]+$/.test(username)) {
                showMessage('❌ Username can only contain letters, numbers, dashes, and underscores', 'error');
                return;
            }
            
            createBtn.disabled = true;
            createBtn.textContent = '⏳ Creating account...';
            
            try {
                const response = await fetch('/api/admin/create-account', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email,
                        username,
                        password
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showMessage('✅ Account created successfully! Redirecting to login...', 'success');
                    
                    // Clear session
                    sessionStorage.removeItem('verifiedAdminEmail');
                    
                    // Redirect to login after 2 seconds
                    setTimeout(() => {
                        window.location.href = 'admin-login.html';
                    }, 2000);
                } else {
                    showMessage('❌ ' + (data.message || 'Failed to create account'), 'error');
                    createBtn.disabled = false;
                    createBtn.textContent = '✅ Create Account';
                }
            } catch (error) {
                showMessage('❌ Error: ' + error.message, 'error');
                createBtn.disabled = false;
                createBtn.textContent = '✅ Create Account';
            }
        });

        // Show message
        function showMessage(message, type = 'info') {
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = message;
            msgDiv.className = `message ${type}`;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Go back
        function goBack() {
            sessionStorage.removeItem('verifiedAdminEmail');
            window.location.href = 'select-interface.html';
        }
    </script>
</body>
</html>
