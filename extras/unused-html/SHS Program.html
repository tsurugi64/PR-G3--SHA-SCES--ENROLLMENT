<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHS Program</title>
    <style>
        .header {
            background-color: #00A693; 
            color: white;
            padding: 10px 19px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-name {
            display: flex;
            align-items: center;
        }

        .logo-button { 
            background: none; 
            border: none;    
            padding: 0;       
            cursor: pointer;  
            display: flex;
            align-items: center;
            color: white;
            text-decoration: none;
        }

        .logo img {
            width: 60px; 
            height: auto;
            margin-right: 10px;
        }

        .school-name {
            font-size: 1.2em;
            font-weight: bold;
        }

        .nav-links {
            display: flex;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            padding: 10px 15px;
            display: block; 
        }

        .nav-links a:hover {
            background-color: rgba(255, 255, 255, 0.1); 
        }

        .social-icons a {
            color: white;
            margin-left: 10px;
            font-size: 1.2em; 
        }

        
        .social-icons a:hover {
            text-decoration: none;
        }

        
        .button-container {
            display: flex;
            justify-content: center;
            margin-top: 20px; 
        }

        .image-button {
            width: 100px; 
            height: auto;
            margin: 0 10px; 
            border: none;
            background: none;
            cursor: pointer;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" integrity="sha512-9usAa10IRO0HhonpyAIVpjrylPvoDwiPUiKdWk5t3PyolY1cOd4DSE0Ga+ri4AuTroPR5aQvXU9xC6qOPnzFeg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>

    <div class="header">
        <div class="logo-name">
            <a href="Home.html" class="logo-button">
                <div class="logo">
                    <img src="sha_logo.png" alt="SHA Logo">
                </div>
                <div class="school-name">
                    Sacred Heart Academy of Sta. Maria (Bulacan), Inc.
                </div>
            </a>
        </div>

        <div class="nav-links">
            <a href="Home.html">Home</a>
            <a href="About Us.html">About Us</a>
            <a href="Contact Us.html">Contact Us</a>
            <a href="SHS Program.html">SHS Program</a>
        </div>

        <div class="social-icons">
        </div>
    </div>

    
    <div class="button-container">
        <a href="#"><img src="STEM.png" alt="STEM" class="image-button"></a>
        <a href="#"><img src="ABM.png" alt="ABM" class="image-button"></a>
        <a href="#"><img src="HUMMS.png" alt="HUMMS" class="image-button"></a>
        <a href="#"><img src="GAS.png" alt="GAS" class="image-button"></a>
        <a href="#"><img src="TVL/HE.png" alt="TVL/HE" class="image-button"></a>
        <a href="#"><img src="TVL/ICT.png" alt="TVL/ICT" class="image-button"></a>
    </div>

    

</body>
</html>
