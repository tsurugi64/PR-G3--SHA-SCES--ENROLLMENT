<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sacred Heart Academy of Sta. Maria</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        /* ===== BACK BUTTON ===== */
        .back-btn {
            position: absolute;
            top: 25px;
            left: 35px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(6px);
            color: white;
            padding: 10px 22px;
            border-radius: 20px;
            font-size: 0.95rem;
            font-weight: bold;
            text-decoration: none;
            transition: 0.3s ease;
            border: 1px solid rgba(255,255,255,0.35);
        }

        .back-btn:hover {
            background: #00A693;
            transform: translateY(-2px);
        }

        /* ===== LOGIN BUTTON ===== */
        .login-btn-top {
            position: absolute;
            top: 25px;
            right: 35px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(6px);
            color: white;
            padding: 10px 22px;
            border-radius: 20px;
            font-size: 0.95rem;
            font-weight: bold;
            text-decoration: none;
            transition: 0.3s ease;
            border: 1px solid rgba(255,255,255,0.35);
        }

        .login-btn-top:hover {
            background: #FF6B6B;
            transform: translateY(-2px);
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 220px;
            height: 100%;
            background: linear-gradient(180deg, #00A693 0%, #008f80 100%);
            color: white;
            padding: 20px 0;
            overflow-y: auto;
            z-index: 100;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.15);
        }

        .logo-section {
            text-align: center;
            padding: 20px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
        }

        .logo-section img {
            width: 80px;
            margin-bottom: 10px;
            border-radius: 8px;
        }

        .logo-section h1 {
            font-size: 1.1em;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .logo-section p {
            font-size: 0.85em;
            opacity: 0.9;
        }

        .nav-menu {
            list-style: none;
            padding: 20px 0;
        }

        .nav-menu li {
            margin: 0;
        }

        .nav-menu a {
            display: block;
            padding: 15px 25px;
            color: white;
            text-decoration: none;
            transition: 0.3s;
            font-weight: 500;
            border-left: 4px solid transparent;
        }

        .nav-menu a:hover {
            background: rgba(255, 255, 255, 0.2);
            border-left-color: #FFD700;
            padding-left: 30px;
        }

        .nav-menu a.active {
            background: rgba(255, 255, 255, 0.3);
            border-left-color: #FFD700;
        }

        /* ===== MAIN CONTENT ===== */
        .main-content {
            margin-left: 220px;
            width: calc(100% - 220px);
            height: 100%;
            overflow: auto;
            position: relative;
        }

        /* ===== HERO SECTION ===== */
        .hero {
            height: 100%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-align: center;
            overflow: hidden;
        }

        .hero video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 2;
        }

        .hero-content {
            position: relative;
            z-index: 3;
            max-width: 800px;
            animation: slideUp 0.8s ease-out;
        }

        .hero-content h1 {
            font-size: 3.5em;
            color: #003F39;
            margin-bottom: 20px;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .hero-content p {
            font-size: 1.3em;
            color: #00695F;
            margin-bottom: 40px;
            font-weight: 500;
        }

        .cta-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 15px 40px;
            font-size: 1.1em;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .btn-primary {
            background: linear-gradient(135deg, #00A693 0%, #008f80 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 166, 147, 0.4);
        }

        .btn-secondary {
            background: white;
            color: #00A693;
            border: 2px solid #00A693;
        }

        .btn-secondary:hover {
            background: #F0F8F6;
            transform: translateY(-3px);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .sidebar {
                width: 180px;
            }

            .main-content {
                margin-left: 180px;
                width: calc(100% - 180px);
            }

            .hero-content h1 {
                font-size: 2.2em;
            }

            .hero-content p {
                font-size: 1em;
            }

            .cta-buttons {
                flex-direction: column;
                gap: 15px;
            }

            .btn {
                width: 100%;
                max-width: 300px;
            }
        }

        @media (max-width: 600px) {
            .sidebar {
                width: 0;
                display: none;
            }

            .main-content {
                margin-left: 0;
                width: 100%;
            }

            .back-btn, .login-btn-top {
                padding: 8px 15px;
                font-size: 0.85rem;
            }

            .hero-content h1 {
                font-size: 1.8em;
            }

            .hero-content p {
                font-size: 0.9em;
            }
        }

        /* ===== ANIMATIONS ===== */
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="logo-section">
            <img src="sha_logo.png" alt="SHA Logo" />
            <h1>Sacred Heart</h1>
            <p>Academy</p>
        </div>
        <ul class="nav-menu">
            <li><a href="index.html" class="active">Home</a></li>
            <li><a href="enrollment-records.html">Enrollment Records</a></li>
            <li><a href="admin-login.html">🔒 Admin</a></li>
        </ul>
    </aside>

    <!-- MAIN CONTENT -->
    <div class="main-content">
        <!-- BUTTONS -->
        <a href="index.html" class="back-btn">← Back</a>
        <a href="admin-login.html" class="login-btn-top">🔒 Admin Login</a>

        <!-- HERO SECTION -->
        <section class="hero">
            <video autoplay muted loop playsinline>
                <source src="WELCOME BACK, BATCH 2026!.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
            <div class="hero-content">
                <h1>Welcome to SHA Enrollment</h1>
                <p>Sacred Heart Academy of Sta. Maria - Your Gateway to Excellence</p>
                <div class="cta-buttons">
                    <a href="final.html" class="btn btn-primary">📝 Enroll Now</a>
                    <a href="enrollment-records.html" class="btn btn-secondary">📋 View Records</a>
                </div>
            </div>
        </section>
    </div>
</body>
</html>
