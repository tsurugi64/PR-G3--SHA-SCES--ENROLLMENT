<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FRONT PAGE</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: 'Poppins', sans-serif;
}

/* BACKGROUND */
body {
    display: flex;
    justify-content: center;
    align-items: center;
    background:
        linear-gradient(rgba(0, 180, 180, 0.9), rgba(0, 140, 140, 0.9)),
        url("sha_logo.png");
    background-size: cover;
    background-position: center;
}

/* BUBBLES */
.bubbles {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    pointer-events: none;
    z-index: 1;
}

.bubble {
    position: absolute;
    bottom: -100px;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    animation: rise linear infinite;
}

@keyframes rise {
    from { transform: translateY(0); opacity: 0.8; }
    to { transform: translateY(-120vh); opacity: 0; }
}

/* MAIN BOX */
.container {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 50px;
    border-radius: 25px;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(10px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.25);
}

h1 {
    color: #008c8c;
    margin-bottom: 30px;
}

.button-group {
    display: flex;
    gap: 20px;
    justify-content: center;
}

button {
    padding: 15px 35px;
    border: none;
    border-radius: 50px;
    font-size: 16px;
    cursor: pointer;
    color: white;
    transition: 0.3s;
}

.student-btn { background: #00b4b4; }
.admin-btn { background: #008c8c; }

button:hover {
    transform: translateY(-4px);
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    z-index: 10;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: white;
    padding: 40px;
    border-radius: 20px;
    width: 100%;
    max-width: 400px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
}

.modal-content h2 {
    color: #003F39;
    margin-bottom: 10px;
    font-size: 1.6em;
}

.modal-subtitle {
    color: #666;
    margin-bottom: 20px;
    font-size: 0.9em;
}

.form-group {
    margin-bottom: 20px;
    text-align: left;
}

.form-group label {
    display: block;
    margin-bottom: 8px;
    color: #003f39;
    font-weight: 600;
    font-size: 0.95em;
}

.form-group input {
    width: 100%;
    padding: 12px;
    border: 2px solid #e0e0e0;
    border-radius: 8px;
    font-size: 1em;
    transition: 0.3s;
}

.form-group input:focus {
    outline: none;
    border-color: #00A693;
    box-shadow: 0 0 8px rgba(0, 166, 147, 0.3);
}

.message {
    padding: 12px;
    border-radius: 8px;
    margin-bottom: 15px;
    display: none;
    font-size: 0.9em;
}

.message.success {
    background: #d4edda;
    color: #155724;
    border: 1px solid #c3e6cb;
    display: block;
}

.message.error {
    background: #f8d7da;
    color: #721c24;
    border: 1px solid #f5c6cb;
    display: block;
}

.btn-modal {
    width: 100%;
    padding: 12px;
    background: #008c8c;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 1em;
    font-weight: 600;
    cursor: pointer;
    transition: 0.25s;
    margin-top: 10px;
}

.btn-modal:hover:not(:disabled) {
    transform: scale(1.04);
}

.btn-modal:disabled {
    opacity: 0.6;
    cursor: not-allowed;
}

.btn-cancel {
    background: #e0e0e0;
    color: #333;
}

/* SHAKE */
@keyframes shake {
    0% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    50% { transform: translateX(5px); }
    75% { transform: translateX(-5px); }
    100% { transform: translateX(0); }
}

.shake {
    animation: shake 0.3s;
}
</style>
</head>

<body>

<div class="bubbles" id="bubbles"></div>

<div class="container">
    <h1>Select Interface</h1>
    <div class="button-group">
        <button class="student-btn" onclick="goStudent()">Student Interface</button>
        <button class="admin-btn" onclick="openModal()">Admin Interface</button>
    </div>
</div>

<!-- ADMIN EMAIL VERIFICATION MODAL -->
<div class="modal" id="adminModal">
    <div class="modal-content" id="modalBox">
        <h2>Admin Login</h2>
        <p class="modal-subtitle">Enter authorized email to create account</p>
        
        <div id="message" class="message"></div>
        
        <form id="adminForm">
            <div class="form-group">
                <label for="email">Email Address:</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    placeholder="example@gmail.com"
                    required
                >
            </div>

            <button type="submit" class="btn-modal" id="checkBtn">
                Check Email
            </button>
            <button type="button" class="btn-modal btn-cancel" onclick="closeModal()">
                Cancel
            </button>
        </form>
    </div>
</div>

<script>
/* BUBBLES */
const container = document.getElementById("bubbles");

for (let i = 0; i < 50; i++) {
    let bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.style.left = Math.random() * 100 + "vw";
    bubble.style.width = (10 + Math.random() * 40) + "px";
    bubble.style.height = bubble.style.width;
    bubble.style.animationDuration = (6 + Math.random() * 10) + "s";
    container.appendChild(bubble);
}

/* NAVIGATION */
function goStudent() {
    window.location.href = "home-for-student.html";
}

function openModal() {
    document.getElementById("adminModal").style.display = "flex";
    document.getElementById("email").focus();
}

function closeModal() {
    document.getElementById("adminModal").style.display = "none";
    document.getElementById("adminForm").reset();
    document.getElementById("message").style.display = "none";
}

function showMessage(text, type = 'info') {
    const msgDiv = document.getElementById("message");
    msgDiv.textContent = text;
    msgDiv.className = 'message ' + type;
}

/* EMAIL VERIFICATION */
document.getElementById('adminForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const email = document.getElementById('email').value.trim();
    const btn = document.getElementById('checkBtn');
    
    btn.disabled = true;
    btn.textContent = 'Checking...';
    
    try {
        const response = await fetch('/api/admin/check-email', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email })
        });
        
        const data = await response.json();
        
        if (data.success) {
            showMessage('✅ Email authorized! Redirecting...', 'success');
            
            // Store email and redirect
            setTimeout(() => {
                sessionStorage.setItem('adminEmail', email);
                window.location.href = 'admin-create.html';
            }, 1000);
        } else {
            showMessage('❌ ' + data.message, 'error');
            btn.disabled = false;
            btn.textContent = 'Check Email';
        }
    } catch (error) {
        showMessage('❌ Error: ' + error.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Check Email';
    }
});

// Close on Escape
document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
});
</script>

</body>
</html>
