<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #00A693 0%, #008f80 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      padding: 40px;
      max-width: 450px;
      width: 100%;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .header img {
      width: 60px;
      height: 60px;
      margin-bottom: 15px;
    }

    .header h1 {
      color: #003F39;
      font-size: 1.8em;
      margin-bottom: 10px;
    }

    .header p {
      color: #666;
      font-size: 0.95em;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    label {
      display: block;
      margin-bottom: 8px;
      color: #003F39;
      font-weight: 600;
      font-size: 0.95em;
    }
    
    input {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-family: inherit;
      font-size: 1em;
      transition: border-color 0.3s;
    }
    
    input:focus {
      outline: none;
      border-color: #00A693;
      box-shadow: 0 0 0 3px rgba(0, 166, 147, 0.1);
    }
    
    .password-group {
      margin-bottom: 20px;
    }
    
    .show-password {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      font-size: 0.9em;
    }
    
    .show-password input {
      width: auto;
      border: none;
      box-shadow: none;
      cursor: pointer;
    }

    .show-password label {
      margin: 0;
      font-weight: 500;
    }
    
    .btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #00A693 0%, #008f80 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1em;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
      margin-bottom: 10px;
    }
    
    .btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0, 166, 147, 0.4);
    }
    
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    
    .btn-secondary {
      background: white;
      color: #00A693;
      border: 2px solid #00A693;
      box-shadow: none;
    }

    .btn-secondary:hover {
      background: #f0f8f6;
      transform: translateY(-2px);
    }
    
    .link {
      text-align: center;
      margin-top: 20px;
    }
    
    .link a {
      color: #00A693;
      text-decoration: none;
      font-weight: 600;
    }
    
    .link a:hover {
      text-decoration: underline;
    }
    
    .message {
      padding: 12px 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
      font-size: 0.95em;
    }
    
    .message.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
      display: block;
    }
    
    .message.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      display: block;
    }

    .info-box {
      background: #f0f8f6;
      border-left: 4px solid #00A693;
      padding: 12px;
      border-radius: 5px;
      margin-bottom: 20px;
      font-size: 0.85em;
      color: #003F39;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="sha_logo.png" alt="SHA Logo">
      <h1>Admin Login</h1>
      <p>Sign in to access the enrollment dashboard</p>
    </div>
    
    <div id="message" class="message"></div>
    
    <div class="info-box">
      Enter the username and password you created during account setup
    </div>
    
    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" placeholder="Enter username" required>
      </div>

      <div class="password-group">
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" placeholder="Enter password" required>
        <div class="show-password">
          <input type="checkbox" id="showPassword" onchange="togglePassword()">
          <label for="showPassword">Show Password</label>
        </div>
      </div>

      <button type="submit" class="btn" id="submitBtn">Login</button>
      <button type="button" class="btn btn-secondary" onclick="goBack()">Back to Select Interface</button>
    </form>
    
    <div class="link">
      New admin? <a href="select-interface.html">Verify your email first</a>
    </div>
  </div>

  <script>
    function togglePassword() {
      const pwd = document.getElementById('password');
      pwd.type = document.getElementById('showPassword').checked ? 'text' : 'password';
    }

    function goBack() {
      window.location.href = 'select-interface.html';
    }
    
    async function handleLogin(event) {
      event.preventDefault();
      
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const messageDiv = document.getElementById('message');
      const submitBtn = document.getElementById('submitBtn');
      
      if (!username || !password) {
        showMessage('Please enter username and password', 'error');
        return;
      }
      
      // Disable button during request
      submitBtn.disabled = true;
      submitBtn.textContent = 'Logging in...';
      
      try {
        const response = await fetch('/api/admin/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ username, password })
        });
        
        const data = await response.json();
        
        if (data.success) {
          // Store admin info in localStorage
          localStorage.setItem('adminUser', JSON.stringify(data.admin));
          localStorage.setItem('userType', 'admin');
          showMessage('Login successful! Redirecting to dashboard...', 'success');
          setTimeout(() => {
            window.location.href = 'admin-dashboard.html';
          }, 1500);
        } else {
          showMessage(data.message || 'Login failed', 'error');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Login';
        }
      } catch (error) {
        showMessage('Error: ' + error.message, 'error');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Login';
      }
    }
    
    function showMessage(text, type) {
      const messageDiv = document.getElementById('message');
      messageDiv.textContent = text;
      messageDiv.className = 'message ' + type;
    }
  </script>
</body>
</html>
