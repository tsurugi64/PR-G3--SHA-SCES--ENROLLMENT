<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #e9ffff, #ffffff, #e0faf6);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      background: linear-gradient(145deg, #ffffff, #e8f8f5);
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.18);
      width: 100%;
      max-width: 400px;
    }
    
    h1 {
      color: #00A693;
      margin-bottom: 10px;
      font-size: 1.8em;
    }
    
    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 0.9em;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    label {
      display: block;
      margin-bottom: 8px;
      color: #003f39;
      font-weight: 600;
      font-size: 0.95em;
    }
    
    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #b5d8d2;
      border-radius: 10px;
      background: linear-gradient(145deg, #ffffff, #eefaf7);
      font-family: 'Poppins', sans-serif;
      font-size: 1em;
      transition: 0.25s;
    }
    
    input:focus {
      outline: none;
      border-color: #00A693;
      box-shadow: 0 0 8px rgba(0, 166, 147, 0.35);
      background: #ffffff;
    }
    
    .password-group {
      margin-bottom: 20px;
    }
    
    .show-password {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      font-size: 0.9em;
    }
    
    .show-password input {
      width: auto;
    }
    
    .btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(145deg, #00b4a4, #008f80);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1em;
      font-weight: 600;
      cursor: pointer;
      transition: 0.25s;
      margin-top: 10px;
    }
    
    .btn:hover {
      transform: scale(1.04);
    }
    
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    
    .link {
      text-align: center;
      margin-top: 20px;
    }
    
    .link a {
      color: #00A693;
      text-decoration: none;
      font-weight: 600;
    }
    
    .link a:hover {
      text-decoration: underline;
    }
    
    .message {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
    }
    
    .message.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
      display: block;
    }
    
    .message.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      display: block;
    }
    
    .info-box {
      background: #e7f3ff;
      border-left: 4px solid #00A693;
      padding: 12px;
      border-radius: 5px;
      margin-bottom: 20px;
      font-size: 0.85em;
      color: #003f39;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Admin Login</h1>
    <p class="subtitle">Sign in to access the enrollment dashboard</p>
    
    <div id="message" class="message"></div>
    
    <div class=\"info-box\">
      ℹ️ Enter the username and password you created during account setup
    </div>
    
    <form id=\"loginForm\" onsubmit=\"handleLogin(event)\">
      <div class="form-group">
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" placeholder="Enter username" required>
      </div>

      <div class="password-group">
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" placeholder="Enter password" required>
        <div class="show-password">
          <input type="checkbox" id="showPassword" onchange="togglePassword()">
          <label for="showPassword" style="margin: 0;">Show Password</label>
        </div>
      </div>

      <button type="submit" class="btn" id="submitBtn">Login</button>
    </form>
    
    <div class="link">
      New admin? <a href="select-interface.html">Verify your email first</a>
    </div>
  </div>

  <script>
    function togglePassword() {
      const pwd = document.getElementById('password');
      pwd.type = document.getElementById('showPassword').checked ? 'text' : 'password';
    }
    
    async function handleLogin(event) {
      event.preventDefault();
      
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const messageDiv = document.getElementById('message');
      const submitBtn = document.getElementById('submitBtn');
      
      if (!username || !password) {
        showMessage('Please enter username and password', 'error');
        return;
      }
      
      // Disable button during request
      submitBtn.disabled = true;
      submitBtn.textContent = 'Logging in...';
      
      try {
        const response = await fetch('/api/admin/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ username, password })
        });
        
        const data = await response.json();
        
        if (data.success) {
          // Store admin info in localStorage
          localStorage.setItem('adminUser', JSON.stringify(data.admin));
          localStorage.setItem('userType', 'admin');
          showMessage('Login successful! Redirecting to dashboard...', 'success');
          setTimeout(() => {
            window.location.href = 'admin-dashboard.html';
          }, 1500);
        } else {
          showMessage(data.message || 'Login failed', 'error');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Login';
        }
      } catch (error) {
        showMessage('Error: ' + error.message, 'error');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Login';
      }
    }
    
    function showMessage(text, type) {
      const messageDiv = document.getElementById('message');
      messageDiv.textContent = text;
      messageDiv.className = 'message ' + type;
    }
  </script>
</body>
</html>
