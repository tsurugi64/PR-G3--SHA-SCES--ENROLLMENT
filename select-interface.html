<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Select Interface - SHA Enrollment System</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #00A693 0%, #008f80 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .main-container {
      display: flex;
      gap: 30px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      max-width: 1000px;
      width: 100%;
    }

    .interface-card {
      background: white;
      border-radius: 15px;
      padding: 40px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 400px;
      text-align: center;
      transition: 0.3s;
    }

    .interface-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 50px rgba(0, 0, 0, 0.3);
    }

    .interface-icon {
      font-size: 60px;
      margin-bottom: 20px;
    }

    .interface-card h2 {
      color: #003F39;
      font-size: 1.8em;
      margin-bottom: 15px;
    }

    .interface-card p {
      color: #666;
      font-size: 0.95em;
      margin-bottom: 25px;
      line-height: 1.5;
    }

    .btn-interface {
      background: linear-gradient(145deg, #00b4a4, #008f80);
      color: white;
      border: none;
      padding: 14px 30px;
      border-radius: 10px;
      font-size: 1em;
      font-weight: 600;
      cursor: pointer;
      transition: 0.25s;
      text-decoration: none;
      display: inline-block;
    }

    .btn-interface:hover {
      transform: scale(1.05);
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
    }

    .modal-content {
      background: white;
      margin: auto;
      padding: 40px;
      border-radius: 15px;
      width: 100%;
      max-width: 400px;
      top: 50%;
      left: 50%;
      position: relative;
      transform: translate(-50%, -50%);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.2);
    }

    .modal h2 {
      color: #003F39;
      margin-bottom: 10px;
      font-size: 1.6em;
    }

    .modal-subtitle {
      color: #666;
      margin-bottom: 20px;
      font-size: 0.9em;
    }

    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #003f39;
      font-weight: 600;
      font-size: 0.95em;
    }

    .form-group input {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1em;
      transition: 0.3s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #00A693;
      box-shadow: 0 0 8px rgba(0, 166, 147, 0.3);
    }

    .message {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 15px;
      display: none;
      font-size: 0.9em;
    }

    .message.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
      display: block;
    }

    .message.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      display: block;
    }

    .btn-modal {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #00b4a4, #008f80);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1em;
      font-weight: 600;
      cursor: pointer;
      transition: 0.25s;
      margin-top: 10px;
    }

    .btn-modal:hover:not(:disabled) {
      transform: scale(1.04);
    }

    .btn-modal:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn-close {
      background: #e0e0e0;
      color: #333;
    }
  </style>
</head>
<body>
  <div class="main-container">
    <!-- Student Interface -->
    <div class="interface-card">
      <div class="interface-icon">👨‍🎓</div>
      <h2>Student Interface</h2>
      <p>Enroll yourself and manage your enrollment information</p>
      <a href="FRONT PAGE.html" class="btn-interface">
        Start Enrollment
      </a>
    </div>

    <!-- Admin Interface -->
    <div class="interface-card">
      <div class="interface-icon">🔐</div>
      <h2>Admin Interface</h2>
      <p>Access the administrative dashboard to manage enrollments</p>
      <button class="btn-interface" onclick="openAdminModal()">
        Admin Access
      </button>
    </div>
  </div>

  <!-- Admin Email Modal -->
  <div id="adminModal" class="modal" onclick="closeAdminModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
      <div id="message" class="message"></div>

      <h2>Admin Login</h2>
      <p class="modal-subtitle">Enter authorized email to create account</p>

      <form id="adminForm">
        <div class="form-group">
          <label for="email">Email Address:</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            placeholder="example@gmail.com"
            required
          >
        </div>

        <button type="submit" class="btn-modal" id="checkBtn">
          Check Email
        </button>

        <button type="button" class="btn-modal btn-close" onclick="closeAdminModal()">
          Cancel
        </button>
      </form>
    </div>
  </div>

  <script>
    function openAdminModal() {
      document.getElementById('adminModal').style.display = 'block';
      document.getElementById('email').focus();
    }

    function closeAdminModal(event) {
      if (event && event.target !== document.getElementById('adminModal')) return;
      document.getElementById('adminModal').style.display = 'none';
      document.getElementById('adminForm').reset();
      document.getElementById('message').style.display = 'none';
    }

    function showMessage(text, type = 'info') {
      const msgDiv = document.getElementById('message');
      msgDiv.textContent = text;
      msgDiv.className = 'message ' + type;
    }

    // Check email authorization
    document.getElementById('adminForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value.trim();
      const btn = document.getElementById('checkBtn');
      
      btn.disabled = true;
      btn.textContent = 'Checking...';
      
      try {
        const response = await fetch('/api/admin/check-email', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        
        const data = await response.json();
        
        if (data.success) {
          showMessage('✅ Email authorized! Redirecting...', 'success');
          
          // Store email and redirect
          setTimeout(() => {
            sessionStorage.setItem('adminEmail', email);
            window.location.href = 'admin-create.html';
          }, 1000);
        } else {
          showMessage('❌ ' + data.message, 'error');
          btn.disabled = false;
          btn.textContent = 'Check Email';
        }
      } catch (error) {
        showMessage('❌ Error: ' + error.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Check Email';
      }
    });

    // Close on Escape
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeAdminModal();
    });
  </script>
</body>
</html>
